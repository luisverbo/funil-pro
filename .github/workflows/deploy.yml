name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          echo "Triggering deploy hook..."
          RESPONSE=$(curl -sv -X POST \
            'https://api.vercel.com/v1/integrations/deploy/prj_eRXulORN1u2x2WvvUTEtJhdv743H/libcNQtnyg' \
            2>&1)
          echo "Response: $RESPONSE"
