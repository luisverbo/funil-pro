name: Deploy to Vercel

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes for queue processing

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: bkiDeo1Zjj1wLD1AFfT9D7Iz
          VERCEL_PROJECT_ID: prj_eRXulORN1u2x2WvvUTEtJhdv743H
        run: |
          mkdir -p .vercel
          echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" > .vercel/project.json
          npm i -g vercel@latest --quiet
          vercel deploy --prod --token $VERCEL_TOKEN --yes

  process-queue:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Process queue
        run: |
          curl -X POST https://funil-pro.vercel.app/api/queue/process
