version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: funil-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  worker:
    build: .
    command: npx tsx src/server.ts
    env_file:
      - .env.local
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
